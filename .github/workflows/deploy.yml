name: Deploy Shell

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive   # ← pulls in all app submodules automatically

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      # Add your deploy step here (Vercel, Netlify, S3, etc.)
      - name: Deploy
        run: echo "Add your deploy command here"
